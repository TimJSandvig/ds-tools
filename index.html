<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHB 2024 Spells</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --parchment: #f5efe0;
    --parchment-dark: #e8dcc8;
    --ink: #2a1a0a;
    --ink-muted: #5c4030;
    --red: #8b1a1a;
    --gold: #9a7b2e;
    --gold-light: #c9a84c;
    --blue: #1a3a5c;
    --green: #1a4a2a;
    --purple: #3a1a5c;
    --teal: #1a4a4a;
    --body-bg: #1a0e05;
  }

  body.dark {
    --parchment: #1c1612;
    --parchment-dark: #252018;
    --ink: #e8dcc8;
    --ink-muted: #a89070;
    --red: #c94040;
    --gold: #c9a84c;
    --gold-light: #e8c870;
    --blue: #6a9ecf;
    --green: #5aab6a;
    --purple: #9a6acf;
    --teal: #5aabab;
    --body-bg: #0e0b08;
  }

  body.dark { background: var(--body-bg); }
  body.dark .page { box-shadow: 0 8px 40px rgba(0,0,0,0.9), inset 0 0 80px rgba(154,123,46,0.04); }
  body.dark select, body.dark input[type="text"] { color: var(--ink); }

  body {
    background: #1a0e05;
    background-image: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px);
    min-height: 100vh;
    font-family: 'Crimson Pro', Georgia, serif;
    color: var(--ink);
    padding: 1rem 0.5rem;
  }

  .page {
    max-width: 1100px;
    margin: 0 auto;
    background: var(--parchment);
    border-radius: 4px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), inset 0 0 80px rgba(154,123,46,0.08);
    padding: 1.5rem 1.25rem;
    border: 1px solid var(--gold);
    position: relative;
  }

  .page::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(154,123,46,0.3);
    pointer-events: none;
    border-radius: 2px;
  }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    margin-bottom: 0.25rem;
    flex-wrap: wrap;
  }
  .header-row h1 { flex: 1; min-width: 0; }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.2rem, 5vw, 2rem);
    font-weight: 600;
    color: var(--red);
    text-align: center;
    letter-spacing: 0.06em;
  }

  .subtitle {
    text-align: center;
    font-style: italic;
    color: var(--ink-muted);
    font-size: 0.9rem;
    margin-bottom: 1.25rem;
  }

  .divider {
    border: none;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
    margin: 1rem 0;
  }

  .dark-btn {
    padding: 0.4rem 0.8rem;
    background: transparent;
    border: 1px solid var(--ink-muted);
    border-radius: 2px;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.06em;
    color: var(--ink-muted);
    cursor: pointer;
    text-transform: uppercase;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .dark-btn:hover { border-color: var(--gold); color: var(--gold); }

  .controls {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.6rem;
    margin-bottom: 1rem;
  }

  .control-group label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    color: var(--gold);
    margin-bottom: 0.3rem;
    text-transform: uppercase;
  }

  .control-group--wide { grid-column: 1 / -1; }

  select, input[type="text"] {
    width: 100%;
    padding: 0.55rem 0.7rem;
    background: var(--parchment-dark);
    border: 1px solid var(--gold);
    border-radius: 2px;
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    color: var(--ink);
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  select:focus, input[type="text"]:focus {
    border-color: var(--gold-light);
    box-shadow: 0 0 0 2px rgba(154,123,46,0.2);
  }

  .search-wrap { position: relative; }
  .search-wrap::after {
    content: '✦';
    position: absolute;
    right: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
    font-size: 0.75rem;
    pointer-events: none;
  }

  .class-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    padding: 0.4rem;
    background: var(--parchment-dark);
    border: 1px solid var(--gold);
    border-radius: 2px;
  }

  .chip {
    padding: 0.3rem 0.6rem;
    background: transparent;
    border: 1px solid rgba(154,123,46,0.5);
    border-radius: 2px;
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.05em;
    color: var(--ink-muted);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    min-height: 2rem;
  }
  .chip:hover { border-color: var(--gold); color: var(--gold); }
  .chip.active { background: var(--blue); border-color: var(--blue); color: var(--parchment); }

  .mode-pill {
    display: inline-block;
    margin-left: 0.4rem;
    padding: 0.1rem 0.45rem;
    background: rgba(154,123,46,0.15);
    border: 1px solid var(--gold);
    border-radius: 2px;
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.06em;
    color: var(--gold);
    cursor: pointer;
    vertical-align: middle;
    user-select: none;
  }
  .mode-pill.and-mode { background: rgba(26,58,92,0.15); border-color: var(--blue); color: var(--blue); }

  .comp-filter-group {
    display: inline-flex;
    gap: 0.25rem;
    margin-left: 0.5rem;
    vertical-align: middle;
  }
  .comp-chip {
    padding: 0.1rem 0.5rem;
    font-size: 0.68rem;
    min-height: unset;
  }
  .comp-chip.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--parchment);
  }

  .toggle-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .toggle-btn {
    padding: 0.5rem 0.9rem;
    background: transparent;
    border: 1px solid var(--ink-muted);
    border-radius: 2px;
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    color: var(--ink-muted);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    flex: 1;
    min-width: 130px;
  }
  .toggle-btn.active-conc { background: var(--teal); color: var(--parchment); border-color: var(--teal); }
  .toggle-btn.active-rit { background: var(--purple); color: var(--parchment); border-color: var(--purple); }

  .reset-btn {
    width: 100%;
    padding: 0.55rem;
    background: transparent;
    border: 1px solid var(--gold);
    border-radius: 2px;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    color: var(--gold);
    cursor: pointer;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .reset-btn:active { background: var(--gold); color: var(--parchment); }

  .count {
    font-style: italic;
    color: var(--ink-muted);
    font-size: 0.88rem;
    margin-bottom: 0.75rem;
  }
  .count span { color: var(--red); font-weight: 600; }

  /* ── DESKTOP TABLE (default ≥701px) ── */
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  thead tr { border-bottom: 2px solid var(--gold); }
  th {
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    color: var(--red);
    text-transform: uppercase;
    padding: 0.55rem 0.5rem;
    text-align: left;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  th:hover { color: var(--gold); }
  th .sort-arrow { display: inline-block; margin-left: 0.25rem; opacity: 0.4; font-size: 0.58rem; }
  th.sorted .sort-arrow { opacity: 1; color: var(--gold-light); }

  tbody tr { border-bottom: 1px solid rgba(154,123,46,0.2); }
  tbody tr:nth-child(even) { background: rgba(154,123,46,0.04); }

  td { padding: 0.45rem 0.5rem; vertical-align: top; }
  td:first-child { font-weight: 600; color: var(--ink); }

  .level-badge {
    display: inline-block;
    padding: 0.1rem 0.45rem;
    border-radius: 2px;
    font-size: 0.72rem;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.03em;
    white-space: nowrap;
    background: rgba(139,26,26,0.1);
    color: var(--red);
    border: 1px solid rgba(139,26,26,0.3);
  }
  .level-badge.cantrip { background: rgba(154,123,46,0.15); color: var(--gold); border-color: var(--gold); }

  .school-badge {
    display: inline-block;
    padding: 0.1rem 0.45rem;
    border-radius: 2px;
    font-size: 0.72rem;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .school-Abjuration    { background: rgba(26,58,92,0.12); color: var(--blue); border: 1px solid rgba(26,58,92,0.3); }
  .school-Conjuration   { background: rgba(26,74,42,0.1); color: var(--green); border: 1px solid rgba(26,74,42,0.3); }
  .school-Divination    { background: rgba(154,123,46,0.12); color: var(--gold); border: 1px solid rgba(154,123,46,0.35); }
  .school-Enchantment   { background: rgba(139,26,26,0.1); color: var(--red); border: 1px solid rgba(139,26,26,0.3); }
  .school-Evocation     { background: rgba(160,80,20,0.1); color: #7a3a0a; border: 1px solid rgba(160,80,20,0.3); }
  .school-Illusion      { background: rgba(58,26,92,0.12); color: var(--purple); border: 1px solid rgba(58,26,92,0.3); }
  .school-Necromancy    { background: rgba(20,20,20,0.1); color: #333; border: 1px solid rgba(20,20,20,0.3); }
  .school-Transmutation { background: rgba(26,74,74,0.1); color: var(--teal); border: 1px solid rgba(26,74,74,0.3); }

  .class-tags { display: flex; flex-wrap: wrap; gap: 0.2rem; }
  .class-tag {
    display: inline-block;
    padding: 0.08rem 0.35rem;
    background: var(--parchment-dark);
    border: 1px solid rgba(154,123,46,0.4);
    border-radius: 2px;
    font-size: 0.7rem;
    color: var(--ink-muted);
    white-space: nowrap;
  }
  .class-tag.highlight { background: rgba(26,58,92,0.12); color: var(--blue); border-color: rgba(26,58,92,0.4); font-weight: 600; }

  .comp-tags { display: flex; gap: 0.2rem; }
  .comp-tag {
    display: inline-block;
    padding: 0.08rem 0.35rem;
    background: var(--parchment-dark);
    border: 1px solid rgba(154,123,46,0.4);
    border-radius: 2px;
    font-size: 0.7rem;
    font-family: 'Cinzel', serif;
    color: var(--ink-muted);
    font-weight: 600;
  }
  .comp-tag.has-m { background: rgba(154,123,46,0.12); color: var(--gold); border-color: var(--gold); }

  .prop-cell { color: var(--ink-muted); font-size: 0.86rem; }

  .tag-conc, .tag-rit {
    display: inline-block;
    padding: 0.05rem 0.35rem;
    border-radius: 2px;
    font-size: 0.66rem;
    font-family: 'Cinzel', serif;
    margin-left: 0.2rem;
  }
  .tag-conc { background: rgba(26,74,74,0.15); color: var(--teal); border: 1px solid rgba(26,74,74,0.35); }
  .tag-rit  { background: rgba(58,26,92,0.12); color: var(--purple); border: 1px solid rgba(58,26,92,0.3); }

  .empty { text-align: center; padding: 2.5rem 1rem; color: var(--ink-muted); font-style: italic; }

  /* ── MOBILE CARD LAYOUT (≤700px) ── */
  @media (max-width: 700px) {
    .page { padding: 1.25rem 0.9rem; }
    .controls { grid-template-columns: 1fr; }

    table { display: block; }
    thead { display: none; }
    tbody { display: block; }

    tbody tr {
      display: block;
      background: rgba(154,123,46,0.04);
      border: 1px solid rgba(154,123,46,0.25);
      border-radius: 4px;
      margin-bottom: 0.6rem;
      padding: 0.6rem 0.75rem;
    }
    tbody tr:nth-child(even) { background: rgba(154,123,46,0.06); }

    td { display: block; padding: 0.2rem 0; border: none; }
    td:first-child {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      color: var(--red);
      padding-bottom: 0.35rem;
      margin-bottom: 0.35rem;
      border-bottom: 1px solid rgba(154,123,46,0.25) !important;
    }

    td[data-label]::before {
      content: attr(data-label);
      display: inline-block;
      min-width: 5.2rem;
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--gold);
      vertical-align: top;
    }

    .class-tags, .comp-tags { display: inline-flex; vertical-align: top; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="header-row">
    <h1>PHB 2024 Spells</h1>
    <button class="dark-btn" id="darkBtn" onclick="toggleDark()">☽ Dark Mode</button>
  </div>
  <p class="subtitle">Player's Handbook — All 389 Spells</p>
  <hr class="divider">

  <div class="controls">
    <div class="control-group">
      <label>Search</label>
      <div class="search-wrap">
        <input type="text" id="search" placeholder="Spell name…">
      </div>
    </div>
    <div class="control-group">
      <label>Level</label>
      <select id="levelFilter">
        <option value="">All Levels</option>
        <option value="0">Cantrip</option>
        <option value="1">Level 1</option>
        <option value="2">Level 2</option>
        <option value="3">Level 3</option>
        <option value="4">Level 4</option>
        <option value="5">Level 5</option>
        <option value="6">Level 6</option>
        <option value="7">Level 7</option>
        <option value="8">Level 8</option>
        <option value="9">Level 9</option>
      </select>
    </div>
    <div class="control-group">
      <label>School</label>
      <select id="schoolFilter">
        <option value="">All Schools</option>
        <option value="Abjuration">Abjuration</option>
        <option value="Conjuration">Conjuration</option>
        <option value="Divination">Divination</option>
        <option value="Enchantment">Enchantment</option>
        <option value="Evocation">Evocation</option>
        <option value="Illusion">Illusion</option>
        <option value="Necromancy">Necromancy</option>
        <option value="Transmutation">Transmutation</option>
      </select>
    </div>
    <div class="control-group">
      <label>Cast Time</label>
      <select id="castFilter">
        <option value="">Any Time</option>
        <option value="Action">Action</option>
        <option value="Bonus Action">Bonus Action</option>
        <option value="Reaction">Reaction</option>
        <option value="1 minute">1 minute+</option>
      </select>
    </div>
    <div class="control-group control-group--wide">
      <label>
        Class <span id="classMode" class="mode-pill" onclick="toggleClassMode()">ANY</span>
        <span class="comp-filter-group">
          <button class="chip comp-chip" id="compFilterV" onclick="toggleCompFilter('V', this)">V</button>
          <button class="chip comp-chip" id="compFilterS" onclick="toggleCompFilter('S', this)">S</button>
          <button class="chip comp-chip" id="compFilterM" onclick="toggleCompFilter('M', this)">M</button>
        </span>
      </label>
      <div class="class-chips" id="classChips">
        <button class="chip" data-class="Bard" onclick="toggleChip(this)">Bard</button>
        <button class="chip" data-class="Cleric" onclick="toggleChip(this)">Cleric</button>
        <button class="chip" data-class="Druid" onclick="toggleChip(this)">Druid</button>
        <button class="chip" data-class="Paladin" onclick="toggleChip(this)">Paladin</button>
        <button class="chip" data-class="Ranger" onclick="toggleChip(this)">Ranger</button>
        <button class="chip" data-class="Sorcerer" onclick="toggleChip(this)">Sorcerer</button>
        <button class="chip" data-class="Warlock" onclick="toggleChip(this)">Warlock</button>
        <button class="chip" data-class="Wizard" onclick="toggleChip(this)">Wizard</button>
      </div>
    </div>
  </div>

  <div class="toggle-row">
    <button class="toggle-btn" id="concBtn" onclick="toggleConc()">Concentration Only</button>
    <button class="toggle-btn" id="ritBtn" onclick="toggleRit()">Ritual Only</button>
  </div>

  <button class="reset-btn" onclick="reset()">Reset Filters</button>

  <p class="count">Showing <span id="countNum">389</span> of 389 spells</p>

  <table>
    <thead>
      <tr>
        <th onclick="sort('name')" id="th-name">Name <span class="sort-arrow">▲</span></th>
        <th onclick="sort('level')" id="th-level">Level <span class="sort-arrow">—</span></th>
        <th onclick="sort('school')" id="th-school">School <span class="sort-arrow">—</span></th>
        <th onclick="sort('castTime')" id="th-castTime">Cast Time <span class="sort-arrow">—</span></th>
        <th onclick="sort('range')" id="th-range">Range <span class="sort-arrow">—</span></th>
        <th onclick="sort('duration')" id="th-duration">Duration <span class="sort-arrow">—</span></th>
        <th>Comp</th>
        <th>Classes</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty" class="empty" style="display:none">No spells match the current filters.</div>
</div>
